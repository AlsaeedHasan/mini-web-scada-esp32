<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Web SCADA</title>
    <style>
      /* SCADA Dark Industrial Theme */
      :root {
        --bg-color: #121212;
        --panel-bg: #1e1e1e;
        --text-main: #ffffff;
        --text-muted: #aaaaaa;
        --accent-color: #00d2ff;
        --indicator-off: #333333;
        --indicator-on: #00ffcc;
        --switch-off: #444444;
        --switch-on: #ff4c4c;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        border-bottom: 2px solid #333;
        padding-bottom: 15px;
        margin-bottom: 30px;
      }

      .header h1 {
        margin: 0;
        color: var(--accent-color);
        letter-spacing: 1px;
      }

      .panel {
        background-color: var(--panel-bg);
        border-radius: 12px;
        padding: 25px;
        margin-bottom: 25px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        border: 1px solid #2a2a2a;
      }

      .panel h2 {
        margin-top: 0;
        color: var(--text-muted);
        font-size: 1.2rem;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .item-label {
        margin-bottom: 15px;
        font-weight: bold;
        font-size: 0.9rem;
        color: var(--text-main);
      }

      /* Sensor Indicator Styles */
      .indicator {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        background-color: var(--indicator-off);
        border: 2px solid #555;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      .indicator.active {
        background-color: var(--indicator-on);
        border-color: var(--indicator-on);
        box-shadow:
          0 0 15px var(--indicator-on),
          inset 0 2px 4px rgba(255, 255, 255, 0.3);
      }

      /* Toggle Switch Styles */
      .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 28px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--switch-off);
        transition: 0.4s;
        border-radius: 34px;
        border: 1px solid #555;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 4px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: var(--switch-on);
        border-color: var(--switch-on);
        box-shadow: 0 0 10px rgba(255, 76, 76, 0.5);
      }

      input:checked + .slider:before {
        transform: translateX(20px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Mini Web SCADA Dashboard</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem">
          ESP32 Control & Monitoring
        </p>
      </div>

      <div class="panel">
        <h2>حالة الحساسات (المدخلات من 74HC165)</h2>
        <div class="grid" id="sensors-grid"></div>
      </div>

      <div class="panel">
        <h2>لوحة التحكم (المخرجات إلى 74HC595)</h2>
        <div class="grid" id="leds-grid"></div>
      </div>
    </div>

    <script>
      // Global state for outputs
      let currentLedsState = 0;

      // Initialize UI Elements
      const sensorsGrid = document.getElementById("sensors-grid");
      const ledsGrid = document.getElementById("leds-grid");

      for (let i = 0; i < 8; i++) {
        // Create Sensor Indicators (Bit 0 to Bit 7)
        sensorsGrid.innerHTML += `
                <div class="item">
                    <span class="item-label">Sensor ${i}</span>
                    <div class="indicator" id="sensor-${i}"></div>
                </div>
            `;

        // Create Control Switches (Bit 0 to Bit 7)
        ledsGrid.innerHTML += `
                <div class="item">
                    <span class="item-label">LED ${i}</span>
                    <label class="switch">
                        <input type="checkbox" onchange="toggleLed(${i}, this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            `;
      }

      // Open WebSocket Connection to the Server
      const ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        console.log("WebSocket Connected Successfully!");
      };

      // Handle Incoming Messages (Sensor States)
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.switches_state !== undefined) {
            const state = data.switches_state;
            for (let i = 0; i < 8; i++) {
              const indicator = document.getElementById(`sensor-${i}`);
              if ((state >> i) & 1) {
                indicator.classList.add("active");
              } else {
                indicator.classList.remove("active");
              }
            }
          }
        } catch (e) {
          console.error("Invalid JSON received");
        }
      };

      ws.onerror = (error) => {
        console.error("WebSocket Error: ", error);
      };

      // Toggle LED State and Send Update to Server
      async function toggleLed(bitIndex, isChecked) {
        if (isChecked) {
          currentLedsState |= 1 << bitIndex;
        } else {
          currentLedsState &= ~(1 << bitIndex);
        }

        if (ws.readyState === WebSocket.OPEN) {
          const payload = JSON.stringify({ leds_state: currentLedsState });
          ws.send(payload);
        } else {
          console.error("WebSocket is not open to send data");
        }
      }
    </script>
  </body>
</html>
